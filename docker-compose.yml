services:
  postgres:
    image: postgres:18-alpine
    container_name: fin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fin
      POSTGRES_PASSWORD: fin
      POSTGRES_DB: fin
    ports:
      - "5432:5432"
    volumes:
      # pg18+ stores data in a versioned subdirectory under
      # /var/lib/postgresql; mounting at /var/lib/postgresql/data is
      # rejected by the entrypoint as a legacy layout.
      - fin-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fin -d fin"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  fin-postgres-data:
